global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "tenderchain-backend"
    static_configs:
      - targets: ["backend-api:3001"]
    metrics_path: "/api/health"

  - job_name: "blockchain-node-1"
    static_configs:
      - targets: ["blockchain-node-1:8545"]

  - job_name: "blockchain-node-2"
    static_configs:
      - targets: ["blockchain-node-2:8546"]
