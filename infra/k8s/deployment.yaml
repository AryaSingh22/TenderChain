apiVersion: apps/v1
kind: Deployment
metadata:
  name: tenderchain-backend
  namespace: tenderchain
  labels:
    app: tenderchain-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tenderchain-backend
  template:
    metadata:
      labels:
        app: tenderchain-backend
    spec:
      containers:
        - name: backend
          image: tenderchain/backend:latest
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: tenderchain-secrets
                  key: database-url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: tenderchain-secrets
                  key: jwt-secret
            - name: RPC_URL
              value: "http://blockchain-node:8545"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: tenderchain-backend
  namespace: tenderchain
spec:
  selector:
    app: tenderchain-backend
  ports:
    - port: 3001
      targetPort: 3001
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tenderchain-frontend
  namespace: tenderchain
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tenderchain-frontend
  template:
    metadata:
      labels:
        app: tenderchain-frontend
    spec:
      containers:
        - name: frontend
          image: tenderchain/frontend:latest
          ports:
            - containerPort: 3000
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: tenderchain-frontend
  namespace: tenderchain
spec:
  selector:
    app: tenderchain-frontend
  ports:
    - port: 80
      targetPort: 3000
  type: LoadBalancer
---
apiVersion: v1
kind: Namespace
metadata:
  name: tenderchain
